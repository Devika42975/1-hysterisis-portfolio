<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">⛅ WeatherNow</div>
            <button id="locationBtn" class="location-btn">📍 Current Location</button>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search for a city..." class="search-input">
                <button id="searchBtn" class="search-btn">Search</button>
            </div>
        </div>

        <!-- Main Weather Display -->
        <div id="weatherDisplay" class="weather-display hidden">
            <!-- Current Weather -->
            <div class="current-weather">
                <div class="current-left">
                    <div class="location-info">
                        <h1 id="cityName">City Name</h1>
                        <p id="currentDate">Date</p>
                    </div>
                    <div class="temp-display">
                        <div class="main-temp">
                            <span id="temperature">25</span>°C
                        </div>
                        <div class="weather-desc">
                            <p id="weatherDescription">Clear Sky</p>
                            <p id="tempRange">H:28° L:18°</p>
                        </div>
                    </div>
                </div>
                <div class="current-right">
                    <div class="weather-icon-large" id="weatherIcon">☀️</div>
                </div>
            </div>

            <!-- Weather Details Grid -->
            <div class="weather-details">
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-icon">🌡️</span>
                        <span>Feels Like</span>
                    </div>
                    <div class="detail-value" id="feelsLike">23°C</div>
                </div>
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-icon">💧</span>
                        <span>Humidity</span>
                    </div>
                    <div class="detail-value" id="humidity">65%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-icon">💨</span>
                        <span>Wind Speed</span>
                    </div>
                    <div class="detail-value" id="windSpeed">12 km/h</div>
                </div>
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-icon">🧭</span>
                        <span>Pressure</span>
                    </div>
                    <div class="detail-value" id="pressure">1013 hPa</div>
                </div>
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-icon">👁️</span>
                        <span>Visibility</span>
                    </div>
                    <div class="detail-value" id="visibility">10 km</div>
                </div>
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-icon">☁️</span>
                        <span>Cloudiness</span>
                    </div>
                    <div class="detail-value" id="cloudiness">20%</div>
                </div>
            </div>

            <!-- Sun Times -->
            <div class="sun-times">
                <div class="sun-item">
                    <span class="sun-icon">🌅</span>
                    <div>
                        <p class="sun-label">Sunrise</p>
                        <p class="sun-time" id="sunrise">6:30 AM</p>
                    </div>
                </div>
                <div class="sun-item">
                    <span class="sun-icon">🌇</span>
                    <div>
                        <p class="sun-label">Sunset</p>
                        <p class="sun-time" id="sunset">6:45 PM</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-message hidden">
            <div class="error-icon">⚠️</div>
            <p>City not found. Please try another search.</p>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
